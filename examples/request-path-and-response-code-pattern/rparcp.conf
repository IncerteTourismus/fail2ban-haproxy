# filter config
# add in /etc/fail2ban/filter.d/rcp.conf
# example to ban ip for 1h if >10 40x response status on my.domain.com/api/login in 1 min

[Definition]
# default log format: %ci:%cp [%tr] %ft %b/%s %TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs %{+Q}r
# example: Apr 21 10:13:56 my-lb haproxy[4109792]: 123.123.123.123:49074 [21/Apr/2026:17:13:56.063] fe_http~ be_frontend_80/my-node 0/0/0/116/182 404 56165 - - --NI 426/426/7/1/0 0/0 {my.domain.com} "GET /api/login HTTP/1.1"
# "^.*haproxy\[[0-9]+\]: " matches the log prefix 
# => "Apr 21 10:13:56 my-lb haproxy[4109792]: "
# "<HOST>" matches "%ci" and is the variable for fail2ban for the ip we will ban 
# => "123.123.123.123"
# ":[0-9].*[\d]+\/[\d]+\/[\d]+\/[\d]+\/[\d]+ " matches everything from the client :port to the response code ":%cp [%tr] %ft %b/%s %TR/%Tw/%Tc/%Tr/%Ta "
# => ":49074 [21/Apr/2026:17:13:56.063] fe_http~ be_frontend_80/my-node 0/0/0/116/182 "
# "40[0-9]" matches the response code "%ST"
# => "404"
# ".*" matches everything to the request " %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs "
# => " 56165 - - --NI 426/426/7/1/0 0/0 {my.domain.com} "
# ""(GET |POST )/api/login.* HTTP/1.1"$" matches the quoted request "%{+Q}r"
# => ""GET /api/login HTTP/1.1""
failregex = ^.*haproxy\[[0-9]+\]: <HOST>:[0-9].*[\d]+\/[\d]+\/[\d]+\/[\d]+\/[\d]+ 40[0-9].*"(GET |POST )/api/login.* HTTP/1.1"$
ignoreregex =


# jail config
# add in /etc/fail2ban/jail.d/rparcp.conf
# will ban the ip for 24h if filter hits 50 times in 1 min
[rparcp]
port     = http,https
filter   = rparcp
logpath  = /var/log/haproxy.log
maxretry = 10
findtime = 1m
bantime  = 1h
enabled  = true
